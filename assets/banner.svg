<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="agentic-stack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="1" stop-color="#131a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="300" rx="20" fill="url(#bg)"/>

  <!-- subtle agent-network motif (right side) -->
  <g stroke="url(#accent)" stroke-width="1.4" opacity="0.30" fill="none">
    <path d="M880 70 L1010 120 M1010 120 L960 210 M960 210 L1080 200 M1080 200 L1120 90 M1120 90 L1010 120 M880 70 L920 180 M920 180 L960 210"/>
  </g>
  <g fill="url(#accent)" opacity="0.85">
    <circle cx="880" cy="70" r="6"/><circle cx="1010" cy="120" r="9"/><circle cx="960" cy="210" r="6"/>
    <circle cx="1080" cy="200" r="7"/><circle cx="1120" cy="90" r="5"/><circle cx="920" cy="180" r="5"/>
  </g>

  <!-- wordmark -->
  <text x="64" y="120" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="78" font-weight="800" fill="url(#accent)" filter="url(#glow)">agentic-stack</text>
  <text x="68" y="166" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="27" font-weight="500" fill="#c7d2fe">Turn Claude Code into a research &amp; decision machine.</text>
  <text x="68" y="198" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" fill="#7c89b8">Evidence in, judgment out — multi-agent, self-learning, wiki-filed.</text>

  <!-- tool pills -->
  <g font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="16" font-weight="600">
    <g transform="translate(68,232)">
      <rect width="118" height="34" rx="17" fill="#1e2742" stroke="#6366f1" stroke-opacity="0.5"/><text x="59" y="22" text-anchor="middle" fill="#a5b4fc">ultradeep</text>
    </g>
    <g transform="translate(196,232)">
      <rect width="138" height="34" rx="17" fill="#1e2742" stroke="#22d3ee" stroke-opacity="0.5"/><text x="69" y="22" text-anchor="middle" fill="#67e8f9">market-scout</text>
    </g>
    <g transform="translate(344,232)">
      <rect width="124" height="34" rx="17" fill="#1e2742" stroke="#34d399" stroke-opacity="0.5"/><text x="62" y="22" text-anchor="middle" fill="#6ee7b7">llm-council</text>
    </g>
    <g transform="translate(478,232)">
      <rect width="74" height="34" rx="17" fill="#1e2742" stroke="#f472b6" stroke-opacity="0.5"/><text x="37" y="22" text-anchor="middle" fill="#f9a8d4">adhd</text>
    </g>
    <g transform="translate(562,232)">
      <rect width="150" height="34" rx="17" fill="#1e2742" stroke="#fbbf24" stroke-opacity="0.5"/><text x="75" y="22" text-anchor="middle" fill="#fcd34d">job-helper +cfg</text>
    </g>
  </g>

  <text x="1136" y="270" text-anchor="end" font-family="'Segoe UI',Helvetica,Arial,sans-serif" font-size="14" fill="#5b6788">MIT · Claude Code · Cursor · Codex</text>
</svg>
